# Daily feed rebuild (CLAUDE.md §7 hosting decision).
# Builds docs/reviews.json from Shopify ssw.review metafields and commits it to
# main; GitHub Pages (Settings → Pages → main /docs) serves it to Klaviyo.
#
# Required repo secrets: SHOPIFY_SHOP (….myshopify.com), SHOPIFY_ADMIN_TOKEN.
# If the collapse guard trips, the job FAILS and the previous feed stays live —
# that is the intended behaviour (§5.1). Investigate, then rerun with force_rebuild.

name: Build reviews feed

on:
  schedule:
    - cron: "0 1 * * *"   # 01:00 UTC = 04:00 Vilnius in summer (03:00 in winter)
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "Bypass the collapse guard (--force)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: build-feed
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Build feed
        env:
          SHOPIFY_SHOP: ${{ secrets.SHOPIFY_SHOP }}
          SHOPIFY_ADMIN_TOKEN: ${{ secrets.SHOPIFY_ADMIN_TOKEN }}
        run: |
          python -m rossi_reviews.build --source shopify --out docs/reviews.json \
            ${{ inputs.force_rebuild && '--force' || '' }}

      - name: Commit & push if changed
        run: |
          git config user.name "rossi-feed-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/reviews.json
          git diff --cached --quiet && echo "feed unchanged" && exit 0
          git commit -m "chore: daily reviews feed rebuild"
          git push
